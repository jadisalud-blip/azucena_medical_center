<body>
    <div class="login-container">
        <div class="logo-login">Azucena</div>
        <div class="tagline">Tech Médica de Élite</div>

        <form id="loginForm">
            <div class="form-group">
                <label>Identificación / Email</label>
                <input type="email" id="email" placeholder="correo@ejemplo.com" required>
            </div>
            <div class="form-group">
                <label>Contraseña</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn-access">Entrar al Sistema</button>
        </form>

        <button id="googleLogin" class="btn-google" style="margin-top: 15px; width: 100%; padding: 12px; border-radius: 50px; border: 1px solid #ddd; background: white; cursor: pointer; display: flex; align-items: center; justify-content: center; font-weight: bold; gap: 10px;">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/action/google.svg" width="20">
            Ingresar con Google
        </button>

        <a href="registro_usuario.html" class="forgot-pass" style="color: var(--main-neon); font-weight: bold; margin-top: 20px;">REGISTRARSE</a>
    </div>

    <script src="firebase-config.js"></script>
    <script src="auth.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso | Azucena Medical Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
</head>
<body class="bg-white min-h-screen flex items-center justify-center p-6">

    <div class="w-full max-w-sm text-center border p-8 rounded-3xl shadow-xl">
        <h2 style="font-family: 'Orbitron';" class="text-2xl font-bold text-blue-900 mb-8">ACCESO ÉLITE</h2>

        <button id="googleBtn" type="button" class="w-full border p-4 rounded-xl flex items-center justify-center gap-3 active:bg-gray-200 shadow-md mb-6">
            <svg width="24" height="24" viewBox="0 0 48 48">
                <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"></path>
                <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"></path>
                <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"></path>
                <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"></path>
            </svg>
            <span class="font-bold text-gray-700">Google Account</span>
        </button>

        <p class="text-xs text-gray-400 mb-4">O INGRESA MANUALMENTE</p>

        <form id="loginForm" class="space-y-4">
            <input type="email" id="email" placeholder="Email" class="w-full p-3 border-b outline-none">
            <input type="password" id="password" placeholder="Contraseña" class="w-full p-3 border-b outline-none">
            <button type="submit" class="w-full bg-blue-600 text-white py-3 rounded-xl font-bold">ENTRAR</button>
        </form>

        <p class="mt-8 text-sm">¿No tienes cuenta? <a href="registro.html" class="text-blue-600 font-bold">Regístrate</a></p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithRedirect, getRedirectResult } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // CONFIGURACIÓN: RELLENA ESTO CON TUS DATOS REALES DE FIREBASE
        const firebaseConfig = {
            apiKey: "PON_AQUI_TU_API_KEY",
            authDomain: "jadi-salud.firebaseapp.com",
            projectId: "jadi-salud",
            storageBucket: "jadi-salud.appspot.com",
            messagingSenderId: "PON_ID_AQUI",
            appId: "PON_APP_ID_AQUI"
        };

        try {
            const app = initializeApp(firebaseConfig);
            const auth = getAuth(app);
            const db = getFirestore(app);
            const provider = new GoogleAuthProvider();

            // Detectar cuando el usuario vuelve de loguearse en Google
            getRedirectResult(auth).then(async (result) => {
                if (result) {
                    await setDoc(doc(db, "usuarios", result.user.uid), {
                        nombre: result.user.displayName,
                        email: result.user.email,
                        fecha: new Date()
                    }, { merge: true });
                    window.location.href = "dashboard.html";
                }
            }).catch(e => alert("Error al entrar: " + e.message));

            // HACER QUE EL BOTÓN FUNCIONE SÍ O SÍ
            document.getElementById('googleBtn').onclick = () => {
                // Si la apiKey no se cambió, avisar al usuario
                if(firebaseConfig.apiKey.includes("PON_AQUI")) {
                    alert("¡Pana! No has puesto tu API KEY de Firebase en el código.");
                } else {
                    signInWithRedirect(auth, provider);
                }
            };

        } catch (error) {
            alert("Error de conexión: " + error.message);
        }

        // Login Manual
        document.getElementById('loginForm').onsubmit = (e) => {
            e.preventDefault();
            window.location.href = "dashboard.html";
        };
    </script>
</body>
</html>

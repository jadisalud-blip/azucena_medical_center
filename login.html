<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso Élite | Azucena Medical Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Roboto', sans-serif; background: #ffffff; }
        .tech-font { font-family: 'Orbitron', sans-serif; }
        .btn-blue { background: linear-gradient(135deg, #00d2ff 0%, #3a7bd5 100%); }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="max-w-md w-full bg-white p-8 rounded-3xl shadow-[0_10px_50px_rgba(0,0,0,0.1)] border border-gray-100 text-center">
        
        <header class="mb-8">
            <h2 class="tech-font text-2xl font-bold text-blue-900 uppercase tracking-tighter">Acceso Élite</h2>
            <p class="text-gray-400 text-[10px] mt-1 tech-font uppercase">Azucena Medical Center</p>
        </header>

        <form id="loginForm" class="space-y-5 text-left">
            <div>
                <label class="block text-[10px] font-bold text-blue-900 tech-font mb-1 uppercase">Email</label>
                <input type="email" id="email" class="w-full p-3 border-b-2 border-gray-100 focus:border-blue-500 outline-none transition text-sm" placeholder="admin@azucena.com" required>
            </div>

            <div class="relative">
                <label class="block text-[10px] font-bold text-blue-900 tech-font mb-1 uppercase">Contraseña</label>
                <input type="password" id="password" class="w-full p-3 border-b-2 border-gray-100 focus:border-blue-500 outline-none transition text-sm" placeholder="••••••••" required>
                <button type="button" onclick="togglePassword()" class="absolute right-2 bottom-3 text-lg">👁️</button>
            </div>

            <button type="submit" class="w-full btn-blue text-white py-3 rounded-xl tech-font font-bold tracking-widest shadow-lg active:scale-95 transition">
                ENTRAR
            </button>
        </form>

        <div class="my-6 flex items-center gap-2">
            <hr class="flex-1 border-gray-100">
            <span class="text-[10px] text-gray-400 tech-font">O ACCEDE CON</span>
            <hr class="flex-1 border-gray-100">
        </div>

        <button id="googleBtn" type="button" class="w-full border border-gray-200 flex items-center justify-center gap-3 py-3 rounded-xl hover:bg-gray-50 active:bg-gray-100 transition shadow-sm">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/action/google.svg" class="w-5 h-5" alt="Google Logo">
            <span class="font-bold text-gray-600 text-sm">Google Account</span>
        </button>

        <footer class="mt-8">
            <p class="text-xs text-gray-500">¿No tienes cuenta?</p>
            <a href="registro.html" class="text-blue-600 font-bold text-sm hover:underline">Registrarse aquí</a>
        </footer>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithRedirect, getRedirectResult } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "TU_API_KEY",
            authDomain: "jadi-salud.firebaseapp.com",
            projectId: "jadi-salud",
            storageBucket: "jadi-salud.appspot.com",
            messagingSenderId: "TU_ID",
            appId: "TU_APP_ID"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        // Manejar el retorno de Google
        getRedirectResult(auth).then((result) => {
            if (result) window.location.href = "dashboard.html";
        }).catch((error) => {
            if (error.code !== 'auth/internal-error') alert("Error: " + error.message);
        });

        // Evento para el botón de Google
        document.getElementById('googleBtn').onclick = () => signInWithRedirect(auth, provider);

        // Login Manual
        document.getElementById('loginForm').onsubmit = (e) => {
            e.preventDefault();
            window.location.href = "dashboard.html";
        };
    </script>

    <script>
        function togglePassword() {
            const p = document.getElementById('password');
            p.type = p.type === 'password' ? 'text' : 'password';
        }
    </script>
</body>
</html>

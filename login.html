<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso | Azucena Medical Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Roboto', sans-serif; background-color: #f8fafc; margin: 0; }
        .tech-font { font-family: 'Orbitron', sans-serif; }
        .glow-blue { 
            background: linear-gradient(135deg, #00d2ff 0%, #3a7bd5 100%);
            box-shadow: 0 4px 15px rgba(58, 123, 213, 0.4);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="max-w-md w-full bg-white p-8 rounded-3xl shadow-2xl border border-gray-100 text-center">
        
        <header class="mb-8">
            <h2 class="tech-font text-2xl font-bold text-blue-900 uppercase tracking-tighter">Acceso Élite</h2>
            <p class="text-gray-400 text-[10px] mt-1 tech-font uppercase">Azucena Medical Center</p>
        </header>

        <!-- Formulario Manual -->
        <form id="loginForm" class="space-y-5 text-left">
            <div>
                <label class="block text-[10px] font-bold text-blue-900 tech-font mb-1 uppercase">Email / Usuario</label>
                <input type="email" id="email" class="w-full p-3 border-b-2 border-gray-100 focus:border-blue-500 outline-none transition text-sm" placeholder="admin@azucena.com" required>
            </div>

            <div class="relative">
                <label class="block text-[10px] font-bold text-blue-900 tech-font mb-1 uppercase">Contraseña</label>
                <input type="password" id="password" class="w-full p-3 border-b-2 border-gray-100 focus:border-blue-500 outline-none transition text-sm" placeholder="••••••••" required>
                <button type="button" onclick="const p = document.getElementById('password'); p.type = p.type === 'password' ? 'text' : 'password'" class="absolute right-2 bottom-3 text-lg">👁️</button>
            </div>

            <button type="submit" class="w-full glow-blue text-white py-3 rounded-xl tech-font font-bold tracking-widest transition active:scale-95">
                ENTRAR
            </button>
        </form>

        <div class="my-6 flex items-center gap-2">
            <hr class="flex-1 border-gray-100">
            <span class="text-[10px] text-gray-400 tech-font uppercase">O accede con</span>
            <hr class="flex-1 border-gray-100">
        </div>

        <!-- Botón Google -->
        <button id="googleBtn" type="button" class="w-full border border-gray-200 flex items-center justify-center gap-3 py-3 rounded-xl hover:bg-gray-50 active:bg-gray-100 transition shadow-sm">
            <svg width="20" height="20" viewBox="0 0 48 48">
                <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"></path>
                <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"></path>
                <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"></path>
                <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"></path>
            </svg>
            <span class="font-bold text-gray-600 text-sm">Google Account</span>
        </button>

        <footer class="mt-8">
            <p class="text-xs text-gray-500">¿No tienes cuenta? 
                <a href="registro.html" class="text-blue-600 font-bold hover:underline">Registrarse aquí</a>
            </p>
        </footer>
    </div>

    <script type="module">
        // Importación de librerías oficiales
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithRedirect, getRedirectResult } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // IMPORTANTE: Ruta basada en tu estructura de GitHub
        import { firebaseConfig } from "./public/js/config.js";

        try {
            // Inicialización de la App
            const app = initializeApp(firebaseConfig);
            const auth = getAuth(app);
            const db = getFirestore(app);
            const provider = new GoogleAuthProvider();

            // Verificar si el usuario viene de redirección
            getRedirectResult(auth).then(async (result) => {
                if (result) {
                    const user = result.user;
                    // Guardar datos en la BD
                    await setDoc(doc(db, "usuarios", user.uid), {
                        nombre: user.displayName,
                        email: user.email,
                        foto: user.photoURL,
                        ultimaConexion: new Date()
                    }, { merge: true });
                    
                    window.location.href = "dashboard.html";
                }
            }).catch((error) => {
                console.error("Error Firebase:", error.code);
                if (error.code !== 'auth/internal-error') {
                    alert("Error: " + error.message);
                }
            });

            // Acción del botón Google
            const btnG = document.getElementById('googleBtn');
            btnG.onclick = () => {
                console.log("Iniciando sesión con Google...");
                signInWithRedirect(auth, provider);
            };

        } catch (e) {
            console.error("Error crítico de configuración:", e);
        }

        // Login Manual (Simulado para pruebas)
        document.getElementById('loginForm').onsubmit = (e) => {
            e.preventDefault();
            window.location.href = "dashboard.html";
        };
    </script>
</body>
</html>

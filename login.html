<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso | Azucena Medical Center</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #00FFFF; --dark: #1A1A1A; }
        body { font-family: 'Montserrat', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; background: #FFF; }
        .card { width: 350px; padding: 40px; border-radius: 20px; border: 1px solid #EEE; box-shadow: 0 10px 30px rgba(0,0,0,0.05); text-align: center; }
        .logo { font-weight: 900; font-size: 1.5rem; letter-spacing: 3px; margin-bottom: 20px; text-transform: uppercase; color: var(--dark); }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #DDD; box-sizing: border-box; }
        .btn-main { width: 100%; background: var(--neon); border: none; padding: 15px; border-radius: 50px; font-weight: 900; cursor: pointer; margin-top: 10px; }
        .btn-google { width: 100%; background: #FFF; border: 1px solid #DDD; padding: 12px; border-radius: 50px; display: flex; align-items: center; justify-content: center; gap: 10px; cursor: pointer; margin-top: 15px; font-weight: 700; }
        .btn-google img { width: 20px; }
        .link-reg { margin-top: 20px; font-size: 0.85rem; color: #666; }
        .link-reg a { color: var(--dark); font-weight: 800; text-decoration: none; border-bottom: 2px solid var(--neon); }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">Azucena</div>
        <form id="loginForm">
            <input type="email" id="email" placeholder="Correo electrónico" required>
            <input type="password" id="password" placeholder="Contraseña" required>
            <button type="submit" class="btn-main">INGRESAR</button>
        </form>
        
        <button id="googleLogin" class="btn-google">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/action/google.svg">
            Ingresar con Google
        </button>

        <div class="link-reg">
            ¿Eres nuevo? <a href="public/registro.html">Regístrate aquí</a>
        </div>
    </div>

    <script type="module" src="public/js/firebase-config.js"></script>
    <script type="module" src="public/js/auth.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Azucena Medical Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
</head>
<body class="bg-white min-h-screen flex items-center justify-center p-6">

    <div class="w-full max-w-sm text-center border p-8 rounded-3xl shadow-xl">
        <h2 style="font-family: 'Orbitron';" class="text-2xl font-bold text-blue-900 mb-8 uppercase">Acceso Élite</h2>

        <form id="loginForm" class="space-y-4 text-left">
            <input type="email" id="email" placeholder="Email" class="w-full p-3 border-b-2 outline-none focus:border-blue-500" required>
            <div class="relative">
                <input type="password" id="password" placeholder="Contraseña" class="w-full p-3 border-b-2 outline-none focus:border-blue-500" required>
                <button type="button" onclick="const p = document.getElementById('password'); p.type = p.type === 'password' ? 'text' : 'password'" class="absolute right-2 top-3">👁️</button>
            </div>
            <button type="submit" class="w-full bg-blue-600 text-white py-3 rounded-xl font-bold">ENTRAR</button>
        </form>

        <div class="my-6 text-gray-400 text-xs">O ACCEDE CON</div>

        <button id="googleBtn" type="button" class="w-full border p-3 rounded-xl flex items-center justify-center gap-3 hover:bg-gray-50 active:bg-gray-200 transition">
            <svg width="20" height="20" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"></path><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"></path><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"></path><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"></path></svg>
            <span class="font-bold text-gray-600">Google Account</span>
        </button>

        <p class="mt-6 text-sm">¿No tienes cuenta? <a href="registro.html" class="text-blue-600 font-bold">Registrarse</a></p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithRedirect, getRedirectResult } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // CONFIGURACIÓN (Asegúrate de que estos datos sean los de tu consola)
        const firebaseConfig = {
            apiKey: "ESCRIBE_AQUI_TU_API_KEY",
            authDomain: "jadi-salud.firebaseapp.com",
            projectId: "jadi-salud",
            storageBucket: "jadi-salud.appspot.com",
            messagingSenderId: "ESCRIBE_AQUI_TU_SENDER_ID",
            appId: "ESCRIBE_AQUI_TU_APP_ID"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        // 1. ESCUCHAR EL RESULTADO (Para que funcione al volver de Google)
        getRedirectResult(auth).then(async (result) => {
            if (result) {
                // GUARDAR EN BD
                const user = result.user;
                await setDoc(doc(db, "usuarios", user.uid), {
                    nombre: user.displayName,
                    email: user.email,
                    foto: user.photoURL,
                    rol: "paciente"
                }, { merge: true });
                
                window.location.href = "dashboard.html";
            }
        }).catch((error) => alert("Error Firebase: " + error.message));

        // 2. BOTÓN GOOGLE (USO DE ONCLICK PARA ASEGURAR RESPUESTA)
        document.getElementById('googleBtn').onclick = () => {
            console.log("Iniciando Google...");
            signInWithRedirect(auth, provider);
        };

        // 3. LOGIN MANUAL
        document.getElementById('loginForm').onsubmit = (e) => {
            e.preventDefault();
            window.location.href = "dashboard.html";
        };
    </script>
</body>
</html>

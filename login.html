<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso | Azucena Medical Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Roboto', sans-serif; background-color: #ffffff; }
        .tech-font { font-family: 'Orbitron', sans-serif; }
        .glow-button {
            background: linear-gradient(to right, #00d2ff, #3a7bd5);
            box-shadow: 0 4px 15px rgba(58, 123, 213, 0.4);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="max-w-md w-full bg-white p-8 rounded-3xl shadow-2xl border border-gray-100">
        <div class="text-center mb-8">
            <h2 class="tech-font text-2xl font-bold text-blue-900 uppercase">Acceso Élite</h2>
            <p class="text-gray-500 text-sm">Azucena Medical Center</p>
        </div>

        <form id="loginForm" class="space-y-6">
            <div>
                <label class="block text-xs font-bold text-blue-900 tech-font mb-1">USUARIO / EMAIL</label>
                <input type="text" id="email" class="w-full p-3 border-b-2 border-gray-200 focus:border-blue-500 outline-none transition" placeholder="ejemplo@medico.com" required>
            </div>

            <div>
                <label class="block text-xs font-bold text-blue-900 tech-font mb-1">CONTRASEÑA</label>
                <div class="relative">
                    <input type="password" id="password" class="w-full p-3 border-b-2 border-gray-200 focus:border-blue-500 outline-none transition" placeholder="••••••••" required>
                    <button type="button" onclick="togglePassword()" class="absolute right-3 top-3 text-gray-400">
                        <span id="eyeIcon">👁️</span>
                    </button>
                </div>
            </div>

            <button type="submit" class="w-full glow-button text-white py-3 rounded-xl tech-font font-bold tracking-widest hover:scale-105 transition">
                ENTRAR
            </button>
        </form>

        <div class="relative my-8">
            <div class="absolute inset-0 flex items-center"><span class="w-full border-t border-gray-200"></span></div>
            <div class="relative flex justify-center text-xs uppercase"><span class="bg-white px-2 text-gray-400 tech-font">O accede con</span></div>
        </div>

        <button id="googleBtn" class="w-full border-2 border-gray-100 flex items-center justify-center gap-3 py-3 rounded-xl hover:bg-gray-50 transition font-bold text-gray-700">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/action/google.svg" class="w-5" alt="Google">
            Ingresar con Google
        </button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        // Reemplaza con tus datos de Firebase Console
        const firebaseConfig = {
            apiKey: "TU_API_KEY",
            authDomain: "TU_PROYECTO.firebaseapp.com",
            projectId: "TU_PROYECTO_ID",
            storageBucket: "TU_PROYECTO.appspot.com",
            messagingSenderId: "TU_ID",
            appId: "TU_APP_ID"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        // 1. LOGIN MANUAL
        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            // Por ahora, simulamos el acceso exitoso enviando al dashboard
            window.location.href = "dashboard.html";
        });

        // 2. LOGIN CON GOOGLE
        document.getElementById('googleBtn').addEventListener('click', async () => {
            try {
                await signInWithPopup(auth, provider);
                window.location.href = "dashboard.html";
            } catch (error) {
                console.error("Error en Google Login:", error);
                alert("Error al ingresar con Google");
            }
        });
    </script>

    <script>
        function togglePassword() {
            const passInput = document.getElementById('password');
            const icon = document.getElementById('eyeIcon');
            if (passInput.type === 'password') {
                passInput.type = 'text';
                icon.innerText = '👓';
            } else {
                passInput.type = 'password';
                icon.innerText = '👁️';
            }
        }
    </script>
</body>
</html>

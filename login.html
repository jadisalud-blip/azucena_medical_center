<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso Élite | Azucena Medical Center</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;800;900&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #FFF; --neon: #00FFFF; --text: #1A1A1A; }
        body { margin: 0; padding: 0; font-family: 'Montserrat', sans-serif; background: var(--bg); display: flex; justify-content: center; align-items: center; height: 100vh; }
        .login-card { width: 100%; max-width: 400px; padding: 40px; border-radius: 25px; border: 1px solid rgba(0,255,255,0.3); box-shadow: 0 10px 40px rgba(0,0,0,0.05); text-align: center; }
        .logo { font-weight: 900; font-size: 1.8rem; letter-spacing: 4px; text-transform: uppercase; margin-bottom: 30px; }
        .form-group { margin-bottom: 20px; text-align: left; }
        label { font-size: 0.7rem; font-weight: 800; text-transform: uppercase; color: #555; }
        input { width: 100%; padding: 15px; border-radius: 12px; border: 1px solid #EEE; box-sizing: border-box; margin-top: 5px; }
        .btn-main { width: 100%; background: var(--neon); color: #000; padding: 18px; border: none; border-radius: 50px; font-weight: 900; text-transform: uppercase; cursor: pointer; box-shadow: 0 5px 20px rgba(0,255,255,0.4); }
        .btn-google { width: 100%; background: #FFF; border: 1px solid #DDD; padding: 14px; border-radius: 50px; display: flex; align-items: center; justify-content: center; gap: 10px; cursor: pointer; margin-top: 15px; font-weight: 700; color: #555; }
        .register-link { margin-top: 25px; display: block; font-size: 0.8rem; font-weight: 800; color: var(--neon); text-decoration: none; }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="logo">Azucena</div>
        <form id="loginForm">
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="email" placeholder="usuario@azucena.com" required>
            </div>
            <div class="form-group">
                <label>Contraseña</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn-main">Ingresar</button>
        </form>
        <button id="googleLogin" class="btn-google" style="display: flex; align-items: center; justify-content: center; gap: 10px;">
    <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/action/google.svg" 
         alt="G" 
         style="width: 20px !important; height: 20px !important; display: block !important;">
    Ingresar con Google
</button> 


        <a href="registro_usuario.html" class="register-link">REGISTRAR NUEVO USUARIO</a>
    </div>

    <script type="module" src="js/firebase-config.js"></script>
    <script type="module" src="js/auth.js"></script>
</body>
</html>

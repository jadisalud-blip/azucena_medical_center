<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Azucena Medical Center - Tu Salud, Nuestra Prioridad</title>
    <style>
        /* CSS BÁSICO PARA QUE SE VEA BIEN (EL VESTIDO) */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
        }

        /* IMAGEN DE FONDO PRINCIPAL */
        .hero-bg {
            /* PANA: Aquí debes poner el link de la imagen que creamos abajo */
            background-image: linear-gradient(rgba(0, 0, 0, 0.5), rgba(0, 0, 0, 0.7)), url('assets/fondo_medico.jpg');
            height: 100vh;
            background-position: center;
            background-repeat: no-repeat;
            background-size: cover;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .hero-content {
            z-index: 1;
            padding: 20px;
        }

        /* BANNER GIRATORIO (TEXTO QUE CAMBIA) */
        #banner-giratorio {
            font-size: 2.5rem;
            font-weight: bold;
            margin-bottom: 30px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            min-height: 1.2em; /* Mantiene el espacio */
        }

        /* BOTÓN LLAMATIVO DE RESERVA */
        .btn-reservar {
            background-color: #25D366; /* Verde WhatsApp */
            color: white;
            padding: 15px 40px;
            font-size: 1.2rem;
            font-weight: bold;
            text-decoration: none;
            border-radius: 50px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            transition: transform 0.2s, background-color 0.2s;
            display: inline-block;
        }

        .btn-reservar:hover {
            background-color: #128C7E;
            transform: scale(1.05);
        }

        /* MENÚ SIMPLE DE NAVEGACIÓN (OPCIONAL) */
        .navbar {
            position: absolute;
            top: 0;
            width: 100%;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-sizing: border-box;
        }
        .logo { font-size: 1.5rem; font-weight: bold; }
    </style>
</head>
<body>

    <div class="navbar">
        <div class="logo">Azucena Medical Center</div>
    </div>

    <div class="hero-bg">
        <div class="hero-content">
            <p>Bienvenido a</p>
            <h1>Azucena Medical Center</h1>
            
            <div id="banner-giratorio">Especialistas en Salud</div>

            <a href="citas.html" class="btn-reservar">¡RESERVAR CITA AHORA!</a>
        </div>
    </div>

    <script>
        // LÓGICA DEL BANNER GIRATORIO (EL SISTEMA NERVIOSO)
        const servicios = [
            "Medicina General para toda la Familia",
            "Fisioterapia y Rehabilitación Integral",
            "Odontología Moderna y Sonrisas Saludables",
            "Atención Médica de Calidad en un solo lugar"
        ];
        
        let index = 0;
        const bannerElement = document.getElementById('banner-giratorio');

        function cambiarTexto() {
            bannerElement.innerHTML = servicios[index];
            index = (index + 1) % servicios.length; // Ciclo infinito
        }

        // Cambia el texto cada 3 segundos (3000 milisegundos)
        cambiarTexto(); // Primera ejecución
        setInterval(cambiarTexto, 3000);
    </script>

</body>
</html>

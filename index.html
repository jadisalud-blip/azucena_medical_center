<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Azucena Medical Center | Tech Médica de Élite</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #FFFFFF;
            --main-neon: #00FFFF;
            --text-color: #1A1A1A;
            --card-bg: #F5F5F5;
        }

        body { margin: 0; font-family: 'Montserrat', sans-serif; overflow-x: hidden; }

        /* CARRUSEL DE PUBLICIDAD */
        .banner-container {
            width: 100%;
            height: 60vh;
            background: #000;
            position: relative;
            overflow: hidden;
        }
        .slide {
            width: 100%;
            height: 100%;
            position: absolute;
            background-size: cover;
            background-position: center;
            display: none;
            transition: 0.5s ease-in-out;
        }
        .slide.active { display: block; }
        .slide-overlay {
            background: rgba(0,0,0,0.4);
            width: 100%; height: 100%;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            color: white; text-align: center;
        }

        /* SECCIÓN SERVICIOS DINÁMICOS */
        .servicios-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 30px;
            padding: 50px;
            background: white;
        }
        .servicio-card {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 25px;
            text-align: center;
            transition: 0.3s;
            border-bottom: 5px solid transparent;
        }
        .servicio-card:hover {
            border-bottom: 5px solid var(--main-neon);
            transform: translateY(-10px);
        }
        .icon-box { font-size: 3rem; margin-bottom: 15px; }

        /* FOOTER REDES Y UBICACIÓN */
        footer {
            background: var(--dark);
            background-color: #1a1a1a;
            color: white;
            padding: 50px;
            text-align: center;
        }
        .social-links a {
            color: var(--main-neon);
            margin: 0 15px;
            text-decoration: none;
            font-weight: 900;
        }
    </style>
</head>
<body>

    <div class="banner-container" id="bannerSlider">
        <div class="slide active">
            <div class="slide-overlay">
                <h1 style="font-size: 3rem; font-weight: 900;">AZUCENA MEDICAL CENTER</h1>
                <p>Innovación Médica a tu Alcance</p>
                <a href="login.html" style="background:var(--main-neon); padding:15px 40px; border-radius:50px; color:black; text-decoration:none; font-weight:900; margin-top:20px;">RESERVAR CITA</a>
            </div>
        </div>
    </div>

    <div style="text-align: center; padding-top: 50px;">
        <h2 style="font-weight: 900; letter-spacing: 3px;">NUESTROS SERVICIOS</h2>
    </div>
    <div class="servicios-grid" id="serviciosPublicos">
        </div>

    <footer>
        <div style="margin-bottom: 30px;">
            <h3>Encuéntranos</h3>
            <p>Av. Principal, Edificio Médico Azucena, Planta Baja</p>
            </div>
        <div class="social-links">
            <a href="#">FACEBOOK</a>
            <a href="#">INSTAGRAM</a>
            <a href="https://wa.me/TUNUMERO">WHATSAPP</a>
        </div>
        <p style="margin-top: 40px; font-size: 0.7rem; color: #555;">&copy; 2024 JADI SALUD - Powered by Tech Élite</p>
    </footer>

    <script type="module" src="public/js/firebase-config.js"></script>
    <script type="module">
        import { db } from './public/js/firebase-config.js';
        import { collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // CARGAR SERVICIOS
        onSnapshot(collection(db, "servicios"), (snapshot) => {
            const container = document.getElementById('serviciosPublicos');
            container.innerHTML = "";
            snapshot.forEach(doc => {
                const s = doc.data();
                container.innerHTML += `
                    <div class="servicio-card">
                        <div class="icon-box">${s.icono || '🩺'}</div>
                        <h3>${s.nombre}</h3>
                        <p style="color:#666; font-size:0.9rem;">${s.desc}</p>
                    </div>
                `;
            });
        });

        // CARGAR PUBLICIDAD (BANNERS)
        onSnapshot(collection(db, "publicidad"), (snapshot) => {
            const slider = document.getElementById('bannerSlider');
            // Mantener el primer slide por defecto y añadir los nuevos
            snapshot.forEach(doc => {
                const p = doc.data();
                const newSlide = document.createElement('div');
                newSlide.className = 'slide';
                newSlide.style.backgroundImage = `url('${p.imagen}')`;
                newSlide.innerHTML = `
                    <div class="slide-overlay">
                        <h2 style="font-size:2.5rem; font-weight:900;">${p.titulo}</h2>
                        <a href="login.html" style="border:2px solid var(--main-neon); padding:10px 30px; color:white; text-decoration:none; border-radius:50px;">SABER MÁS</a>
                    </div>
                `;
                slider.appendChild(newSlide);
            });
            iniciarSlider();
        });

        function iniciarSlider() {
            let current = 0;
            const slides = document.querySelectorAll('.slide');
            if(slides.length <= 1) return;
            
            setInterval(() => {
                slides[current].classList.remove('active');
                current = (current + 1) % slides.length;
                slides[current].classList.add('active');
            }, 5000); // Cambia cada 5 segundos
        }
    </script>
</body>
</html>

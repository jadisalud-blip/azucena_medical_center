<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Azucena Medical Center | Tech Médica de Élite</title>
    <style>
        /* ESTILO JADI SALUD CLARO - NEÓN VIBRANTE */
        :root {
            --bg-color: #FFFFFF; /* FONDO BLANCO PURO */
            --main-neon: #00FFFF; /* CELESTE NEÓN */
            --main-neon-glow: rgba(0, 255, 255, 0.4);
            --text-color: #1A1A1A; /* Texto casi negro para contraste */
            --subtitle-color: #666666;
            --card-bg: #F5F5F5; /* Gris muy claro para tarjetas */
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Montserrat', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            overflow-x: hidden;
        }

        /* BARRA DE NAVEGACIÓN DISCRETA (EN BLANCO) */
        .navbar {
            padding: 20px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: absolute;
            width: 100%;
            box-sizing: border-box;
            z-index: 10;
        }
        .logo { 
            font-size: 1.2rem; 
            font-weight: 800; 
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* SECCIÓN PRINCIPAL (HERO) - FONDO BLANCO */
        .hero {
            display: flex;
            height: 100vh;
            align-items: center;
            padding: 0 50px;
            box-sizing: border-box;
        }

        /* COLUMNA DE IMAGEN CON FILTRO CLARO Y GLOW CELESTE */
        .hero-image-side {
            flex: 1;
            height: 80%;
            /* PANA: Aquí debes poner el link de la imagen médica que crearemos */
            background-image: url('assets/medico_elite_light.jpg'); 
            background-size: cover;
            background-position: center;
            border-right: 4px solid var(--main-neon);
            box-shadow: 20px 0 80px -20px var(--main-neon-glow);
            position: relative;
        }

        /* COLUMNA DE TEXTO Y BOTÓN JADI STYLE */
        .hero-text-side {
            flex: 1;
            padding-left: 80px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: flex-start;
        }

        .title-jadi {
            font-size: 4rem;
            font-weight: 900;
            line-height: 1;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 3px;
        }
        .subtitle-jadi {
            font-size: 1.5rem;
            font-weight: 300;
            letter-spacing: 5px;
            margin: 10px 0 50px 0;
            text-transform: uppercase;
            color: var(--subtitle-color);
        }

        /* EL GRAN BOTÓN ÓVALO CELESTE NEÓN */
        .btn-jadi {
            background-color: var(--main-neon);
            color: #000000; /* Texto negro para contraste */
            padding: 25px 60px;
            font-size: 1.5rem;
            font-weight: 900;
            text-decoration: none;
            border-radius: 100px; /* Óvalo perfecto */
            text-transform: uppercase;
            letter-spacing: 2px;
            box-shadow: 0 10px 40px var(--main-neon-glow);
            transition: all 0.3s ease;
        }

        .btn-jadi:hover {
            box-shadow: 0 15px 60px var(--main-neon);
            transform: translateY(-5px);
        }

        /* BANNER GIRATORIO ABAJO - DISCRETO EN GRIS */
        .servicios-bar {
            position: absolute;
            bottom: 30px;
            right: 50px;
            color: var(--subtitle-color);
            font-size: 0.9rem;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;800;900&display=swap" rel="stylesheet">
</head>
<body>

    <div class="navbar">
        <div class="logo">Azucena Medical Center</div>
    </div>

    <div class="hero">
        <div class="hero-image-side"></div>

        <div class="hero-text-side">
            <h1 class="title-jadi">Azucena<br>Salud</h1>
            <p class="subtitle-jadi">Tech Médica de Élite</p>
            
            <a href="login.html" class="btn-jadi">¡Reserva Ahora!</a>
        </div>
    </div>

</body>
</html>

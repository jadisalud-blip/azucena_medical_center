<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Panel de Publicidad | Azucena</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
</head>
<body class="bg-gray-100 p-6">
    <div class="max-w-4xl mx-auto space-y-8">
        <div class="bg-white p-8 rounded-3xl shadow-lg border-t-4 border-blue-600">
            <h2 class="tech-font font-bold text-blue-900 mb-6 uppercase">Editar Banner Principal</h2>
            <div class="space-y-4">
                <input type="text" id="input-titulo" placeholder="Título (Ej: Cuidamos tu salud)" class="w-full p-3 border rounded-xl">
                <textarea id="input-subtitulo" placeholder="Subtítulo informativo..." class="w-full p-3 border rounded-xl"></textarea>
                <button id="btn-guardar-textos" class="bg-blue-600 text-white px-6 py-2 rounded-xl font-bold">Actualizar Web</button>
            </div>
        </div>

        <div class="bg-white p-8 rounded-3xl shadow-lg border-t-4 border-green-500">
            <h2 class="tech-font font-bold text-green-900 mb-6 uppercase">Nueva Oferta / Servicio</h2>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <input type="text" id="promo-titulo" placeholder="Nombre (Ej: Limpieza Dental)" class="p-3 border rounded-xl">
                <input type="text" id="promo-precio" placeholder="Precio (Ej: 25)" class="p-3 border rounded-xl">
                <input type="text" id="promo-icono" placeholder="Icono (Emoji)" class="p-3 border rounded-xl">
                <textarea id="promo-desc" placeholder="Descripción corta..." class="md:col-span-3 p-3 border rounded-xl"></textarea>
                <button id="btn-agregar-promo" class="md:col-span-3 bg-green-600 text-white py-3 rounded-xl font-bold">Publicar Oferta</button>
            </div>
        </div>
    </div>
    <script type="module" src="./public/js/publicidad-admin.js"></script>
</body>
</html>

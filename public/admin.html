<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Administrativo | Azucena</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #00FFFF; --dark: #1A1A1A; --bg: #F4F7F6; }
        body { font-family: 'Montserrat', sans-serif; margin: 0; background: var(--bg); display: none; }
        .wrapper { display: flex; min-height: 100vh; }
        
        /* Sidebar */
        .sidebar { width: 260px; background: var(--dark); color: white; padding: 30px; display: flex; flex-direction: column; position: fixed; height: 100vh; }
        .sidebar h2 { font-weight: 900; color: var(--neon); font-size: 1.2rem; margin-bottom: 40px; }
        .menu-item { color: #BBB; text-decoration: none; padding: 15px; border-radius: 10px; margin-bottom: 10px; font-weight: 700; transition: 0.3s; cursor: pointer; }
        .menu-item:hover, .menu-item.active { background: rgba(0, 255, 255, 0.1); color: var(--neon); }
        
        .main-content { flex: 1; margin-left: 260px; padding: 40px; }
        .section { display: none; } /* Ocultas por defecto */
        .section.active { display: block; } /* Solo la activa se ve */

        /* Formularios Estilo Pro */
        .card-form { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); margin-bottom: 30px; }
        input, textarea { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #DDD; border-radius: 8px; font-family: inherit; }
        .btn-save { background: var(--dark); color: var(--neon); border: none; padding: 12px 25px; border-radius: 50px; font-weight: 900; cursor: pointer; }
        
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 15px; overflow: hidden; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #EEE; }
        th { background: #F8F9FA; color: #888; font-size: 0.8rem; text-transform: uppercase; }
    </style>
</head>
<body>

    <div class="wrapper">
        <nav class="sidebar">
            <h2>AZUCENA</h2>
            <div class="menu-item active" onclick="showSection('dash')">Dashboard</div>
            <div class="menu-item" onclick="showSection('servicios')">Gestión Servicios</div>
            <div class="menu-item" onclick="showSection('promo')">Publicidad/Banners</div>
            <div class="menu-item">Inventarios</div>
            <div class="menu-item">Pacientes</div>
            
            <button id="btnSalir" style="margin-top:auto; background:none; border:1px solid #555; color:white; padding:10px; cursor:pointer; border-radius:10px;">Cerrar Sesión</button>
        </nav>

        <main class="main-content">
            <div id="sec-dash" class="section active">
                <h1 id="txtBienvenida">Cargando...</h1>
                <div style="display:grid; grid-template-columns: repeat(3, 1fr); gap:20px;">
                    <div style="background:white; padding:20px; border-radius:20px;"><h3>12</h3><p>Servicios Activos</p></div>
                </div>
            </div>

            <div id="sec-servicios" class="section">
                <h1>Gestionar Servicios Médicos</h1>
                <div class="card-form">
                    <h3>Añadir Nuevo Servicio</h3>
                    <input type="text" id="servNombre" placeholder="Nombre del Servicio (Ej: Fisioterapia)">
                    <textarea id="servDesc" placeholder="Descripción corta para el paciente"></textarea>
                    <input type="text" id="servIcono" placeholder="Icono (Ej: 🦷, 🧘, 🩺)">
                    <button class="btn-save" id="btnGuardarServicio">GUARDAR SERVICIO</button>
                </div>
                <table>
                    <thead>
                        <tr><th>Servicio</th><th>Descripción</th><th>Acciones</th></tr>
                    </thead>
                    <tbody id="listaServicios">
                        </tbody>
                </table>
            </div>

            <div id="sec-promo" class="section">
                <h1>Publicidad del Index</h1>
                <div class="card-form">
                    <h3>Subir Banner Publicitario</h3>
                    <input type="text" id="pubTitulo" placeholder="Título de la Promo">
                    <input type="text" id="pubLink" placeholder="Link de la imagen (URL)">
                    <button class="btn-save" id="btnGuardarPub">PUBLICAR EN WEB</button>
                </div>
            </div>
        </main>
    </div>

    <script>
        // Función simple para cambiar de vista
        function showSection(sec) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.menu-item').forEach(m => m.classList.remove('active'));
            document.getElementById('sec-' + sec).classList.add('active');
            event.currentTarget.classList.add('active');
        }
    </script>

    <script type="module" src="js/firebase-config.js"></script>
    <script type="module" src="js/admin_logic.js"></script>
    
    <script type="module">
        import { auth, db } from './js/firebase-config.js';
        import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const docRef = doc(db, "usuarios", user.uid);
                const docSnap = await getDoc(docRef);
                if (docSnap.exists() && (docSnap.data().rol === "admin" || docSnap.data().rol === "programador")) {
                    document.body.style.display = "block";
                    document.getElementById('txtBienvenida').innerText = `Panel de Control: ${docSnap.data().nombre}`;
                } else { window.location.href = "paciente.html"; }
            } else { window.location.href = "../login.html"; }
        });

        document.getElementById('btnSalir').addEventListener('click', () => {
            signOut(auth).then(() => window.location.href = "../login.html");
        });
    </script>
</body>
</html>
